#cloud-config
package_update: true
package_upgrade: true

packages:
  - nginx
  - python3
  - python3-pip
  - certbot
  - python3-certbot-nginx
  - curl
  - dmidecode
  - util-linux
  - net-tools

write_files:
  - path: /opt/vminfo/server.py
    permissions: "0755"
    content: |
      #!/usr/bin/env python3
      import json, subprocess, platform, socket, os
      from http.server import HTTPServer, BaseHTTPRequestHandler
      from datetime import datetime, timezone

      HTML_FILE = "/opt/vminfo/dashboard.html"

      def run(cmd, default="n/a"):
          try:
              return subprocess.check_output(cmd, stderr=subprocess.DEVNULL, timeout=5).decode().strip()
          except Exception:
              return default

      def collect_info():
          hostname = socket.getfqdn()
          primary_ip = run(["hostname", "-I"]).split()[0]
          cpu_model = run(["sh", "-c", "lscpu | grep 'Model name' | awk -F: '{print $2}' | xargs"])
          cpu_cores = run(["nproc"])
          cpu_arch  = platform.machine()
          mem_total = run(["sh", "-c", "free -h | awk '/^Mem:/{print $2}'"])
          mem_used  = run(["sh", "-c", "free -h | awk '/^Mem:/{print $3}'"])
          mem_free  = run(["sh", "-c", "free -h | awk '/^Mem:/{print $4}'"])
          lsblk_out = run(["lsblk", "-J", "-o", "NAME,SIZE,TYPE,MOUNTPOINT,FSTYPE"])
          try:
              blk = json.loads(lsblk_out).get("blockdevices", [])
          except Exception:
              blk = []
          df_out = run(["df", "-h", "--output=source,size,used,avail,pcent,target", "-x", "tmpfs", "-x", "devtmpfs"])
          filesystems = []
          for line in df_out.splitlines()[1:]:
              parts = line.split()
              if len(parts) >= 6:
                  filesystems.append({"device": parts[0], "size": parts[1], "used": parts[2], "available": parts[3], "use_percent": parts[4], "mountpoint": parts[5]})
          os_release = {}
          try:
              with open("/etc/os-release") as f:
                  for l in f:
                      k, _, v = l.strip().partition("=")
                      os_release[k] = v.strip('"')
          except Exception:
              pass
          kernel = platform.release()
          uptime_s = run(["sh", "-c", "awk '{printf \"%d\", $1}' /proc/uptime"])
          try:
              up_sec = int(uptime_s)
              uptime = f"{up_sec // 86400}d {(up_sec % 86400) // 3600}h {(up_sec % 3600) // 60}m"
          except Exception:
              uptime = "n/a"
          virt = run(["systemd-detect-virt", "--vm"])
          dmi_bios = run(["dmidecode", "-s", "system-manufacturer"])
          hypervisor = virt if virt not in ("none", "n/a") else dmi_bios
          loadavg = run(["cat", "/proc/loadavg"]).split()[:3]
          load = {"1min": loadavg[0], "5min": loadavg[1], "15min": loadavg[2]} if len(loadavg) == 3 else {}
          ifaces = []
          try:
              out = run(["ip", "-j", "addr"])
              for iface in json.loads(out):
                  addrs = [a["local"] for a in iface.get("addr_info", [])]
                  ifaces.append({"name": iface["ifname"], "mac": iface.get("address", ""), "addresses": addrs, "state": iface.get("operstate", "")})
          except Exception:
              pass
          return {
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "hostname": hostname,
              "network": {"primary_ip": primary_ip, "interfaces": ifaces},
              "os": {"name": os_release.get("PRETTY_NAME", platform.system()), "kernel": kernel, "arch": cpu_arch, "uptime": uptime},
              "cpu": {"model": cpu_model, "cores": cpu_cores, "arch": cpu_arch, "load": load},
              "memory": {"total": mem_total, "used": mem_used, "free": mem_free},
              "storage": {"block_devices": blk, "filesystems": filesystems},
              "hypervisor": hypervisor,
          }

      class InfoHandler(BaseHTTPRequestHandler):
          def log_message(self, fmt, *args):
              print(f"[{datetime.now().isoformat()}] {fmt % args}")
          def do_GET(self):
              if self.path in ("/api", "/api/"):
                  data = json.dumps(collect_info(), indent=2)
                  self._respond(200, "application/json", data.encode())
              elif self.path in ("/", "/index.html"):
                  try:
                      with open(HTML_FILE, "rb") as f:
                          self._respond(200, "text/html; charset=utf-8", f.read())
                  except FileNotFoundError:
                      self._respond(404, "text/plain", b"dashboard.html not found")
              else:
                  self._respond(404, "text/plain", b"Not Found")
          def _respond(self, code, ctype, body):
              self.send_response(code)
              self.send_header("Content-Type", ctype)
              self.send_header("Content-Length", str(len(body)))
              self.send_header("Access-Control-Allow-Origin", "*")
              self.end_headers()
              self.wfile.write(body)

      if __name__ == "__main__":
          server = HTTPServer(("127.0.0.1", 8080), InfoHandler)
          print("VM-Info Server gestartet auf http://127.0.0.1:8080")
          server.serve_forever()

  - path: /etc/systemd/system/vminfo.service
    content: |
      [Unit]
      Description=VM Info HTTP Service
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/python3 /opt/vminfo/server.py
      Restart=always
      RestartSec=5
      User=root
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /opt/vminfo/dashboard.html
    content: |
      <!DOCTYPE html>
      <html lang="de">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>VM System Dashboard</title>
        <style>
          :root { --bg: #0a0c10; --surface: #111520; --border: #1e2535; --accent: #00e5ff; --ok: #00e676; --warn: #ffab00; --text: #c9d1e0; --muted: #4a5568; --heading: #ffffff; }
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { background: var(--bg); color: var(--text); font-family: monospace; font-size: 13px; padding: 24px; }
          h1 { font-size: 24px; color: var(--heading); margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
          h1 span { color: var(--accent); }
          .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
          .card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 4px; padding: 16px; }
          .card-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
          .kv { display: flex; flex-direction: column; gap: 6px; }
          .kv-row { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
          .kv-row:last-child { border-bottom: none; }
          .kv-key { color: var(--muted); }
          .kv-value { color: var(--heading); text-align: right; }
          .bar-wrap { background: var(--border); border-radius: 2px; height: 4px; margin-top: 4px; }
          .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
          .bar-fill.warn { background: var(--warn); }
          .bar-fill.crit { background: #f44336; }
          footer { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 12px; font-size: 12px; }
          footer a { color: var(--accent); text-decoration: none; margin-right: 16px; }
          #ts { color: var(--muted); font-size: 11px; margin-bottom: 16px; }
        </style>
      </head>
      <body>
        <h1>VM <span>Dashboard</span></h1>
        <div id="ts">Lade Daten...</div>
        <div id="root"></div>
        <footer>
          <a href="/api" target="_blank">/api - JSON Rohdaten</a>
          <a href="/" onclick="location.reload()">Aktualisieren</a>
        </footer>
        <script>
          function kv(rows) {
            return '<div class="kv">' + rows.map(([k,v]) =>
              '<div class="kv-row"><span class="kv-key">'+k+'</span><span class="kv-value">'+v+'</span></div>'
            ).join('') + '</div>';
          }
          function card(title, html) {
            return '<div class="card"><div class="card-title">'+title+'</div>'+html+'</div>';
          }
          async function load() {
            const res = await fetch('/api');
            const d = await res.json();
            document.getElementById('ts').textContent = 'Stand: ' + new Date(d.timestamp).toLocaleString('de-AT');
            let cards = '';
            cards += card('Allgemein', kv([['Hostname', d.hostname], ['Primaere IP', d.network.primary_ip], ['Hypervisor', d.hypervisor||'n/a'], ['Uptime', d.os.uptime]]));
            cards += card('Betriebssystem', kv([['OS', d.os.name], ['Kernel', d.os.kernel], ['Architektur', d.os.arch]]));
            cards += card('CPU', kv([['Modell', d.cpu.model], ['Kerne', d.cpu.cores], ['Load 1m', d.cpu.load['1min']||'n/a'], ['Load 5m', d.cpu.load['5min']||'n/a']]));
            cards += card('Arbeitsspeicher', kv([['Gesamt', d.memory.total], ['Verwendet', d.memory.used], ['Frei', d.memory.free]]));
            let fsHtml = '<div class="kv">';
            for (const fs of d.storage.filesystems) {
              const pct = parseInt(fs.use_percent)||0;
              const cls = pct>90?'crit':pct>75?'warn':'';
              fsHtml += '<div class="kv-row" style="flex-direction:column;align-items:stretch"><div style="display:flex;justify-content:space-between"><span class="kv-key">'+fs.mountpoint+'</span><span class="kv-value">'+fs.used+'/'+fs.size+' ('+fs.use_percent+')</span></div><div class="bar-wrap"><div class="bar-fill '+cls+'" style="width:'+pct+'%"></div></div></div>';
            }
            fsHtml += '</div>';
            cards += card('Dateisysteme', fsHtml);
            let ifHtml = '';
            for (const ifc of d.network.interfaces) {
              ifHtml += '<div style="margin-bottom:8px;padding:8px;background:var(--bg);border:1px solid var(--border)"><div style="color:var(--accent);font-weight:bold">'+ifc.name+' <span style="font-size:10px;color:'+(ifc.state==='UP'?'var(--ok)':'#f44336')+'">'+ifc.state+'</span></div><div style="color:var(--muted);font-size:11px">'+ifc.addresses.join(', ')+'</div></div>';
            }
            cards += card('Netzwerk', ifHtml);
            document.getElementById('root').innerHTML = '<div class="grid">'+cards+'</div>';
          }
          load();
          setInterval(load, 30000);
        </script>
      </body>
      </html>

  - path: /etc/nginx/sites-available/vminfo
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name _;

          location /.well-known/acme-challenge/ {
              root /var/www/certbot;
          }

          location /api {
              proxy_pass http://127.0.0.1:8080/api;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              add_header Access-Control-Allow-Origin "*" always;
          }

          location / {
              proxy_pass http://127.0.0.1:8080;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
          }
      }

runcmd:
  - mkdir -p /opt/vminfo /var/www/certbot
  - rm -f /etc/nginx/sites-enabled/default
  - ln -sf /etc/nginx/sites-available/vminfo /etc/nginx/sites-enabled/vminfo
  - systemctl daemon-reload
  - systemctl enable vminfo
  - systemctl start vminfo
  - nginx -t && systemctl enable nginx && systemctl start nginx
  - sleep 2 && systemctl reload nginx
  - echo "Cloud-Init abgeschlossen" | systemd-cat -p info -t cloud-init
