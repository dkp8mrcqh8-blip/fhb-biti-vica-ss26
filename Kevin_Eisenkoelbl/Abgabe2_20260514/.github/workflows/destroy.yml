# =============================================================================
# .github/workflows/destroy.yml
# GitHub Actions Workflow zum LÖSCHEN der Exoscale-Infrastruktur
# Nur manuell auslösbar (Schutz vor versehentlichem Löschen)
# =============================================================================

name: 🗑️ Infrastruktur löschen

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domainname (muss mit deploy übereinstimmen!)'
        required: true
        type: string
      confirm:
        description: 'Zur Bestätigung "LOESCHEN" eingeben'
        required: true
        type: string

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    if: github.event.inputs.confirm == 'LOESCHEN'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4

      # State aus Cache laden – ohne State weiß Terraform nicht was zu löschen ist
      - name: 💾 State Cache laden
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: tfstate-vica-ss26

      - name: 🔧 OpenTofu installieren
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.7.3"

      - name: 🔄 Terraform init
        run: tofu init

      - name: 🗑️ Terraform destroy
        run: |
          tofu destroy -auto-approve \
            -var="exoscale_api_key=${{ secrets.EXOSCALE_API_KEY }}" \
            -var="exoscale_api_secret=${{ secrets.EXOSCALE_API_SECRET }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="domain=${{ github.event.inputs.domain }}" \
            -var="letsencrypt_email=destroy@example.com"

      - name: 📊 Job-Summary schreiben
        if: success()
        run: |
          echo "## ✅ Infrastruktur erfolgreich gelöscht" >> $GITHUB_STEP_SUMMARY
          echo "Alle Ressourcen wurden entfernt." >> $GITHUB_STEP_SUMMARY
